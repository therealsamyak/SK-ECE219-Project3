pre-commit:
  parallel: true
  jobs:
    - name: ruff check
      run: uv tool run ruff check --fix {staged_files}
      glob: "*.{py, ipynb}"
      stage_fixed: true

    - name: ruff format
      run: uv tool run ruff format {staged_files}
      glob: "*.{py, ipynb}"
      stage_fixed: true

    - name: fmt
      run: bunx prettier --write {staged_files}
      glob: "*.{json, md, yml}"
      stage_fixed: true
